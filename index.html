<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>初啼 · 冷凍取貨門市（試用）</title>
<style>
  body{margin:0;background:#f2f4f6;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;color:#333}
  .demo{max-width:520px;margin:0 auto;padding:16px 14px 60px}
  .note{background:#fff8e6;border:1px solid #f0e0a8;border-radius:12px;padding:12px 14px;font-size:13px;color:#8a6d1a;line-height:1.7;margin-bottom:16px}
  .card{background:#fff;border:1px solid #e7e7e7;border-radius:14px;padding:16px 16px 18px}
  .card h3{margin:0 0 4px;font-size:17px}
  .card .sub{color:#999;font-size:12px;margin-bottom:6px}
  .fake{margin-top:10px;border:1px solid #e0e0e0;border-radius:10px;padding:13px;color:#999;font-size:14px;background:#fafafa}
  .foot{text-align:center;color:#aaa;font-size:12px;margin-top:22px;line-height:1.8}
</style>
</head>
<body>
<div class="demo">
  <div class="note">👀 <b>這是試用版</b>，讓你先體驗「選冷凍門市」的流程。<br>正式版會直接出現在你官網的結帳頁，你只要點下面那顆 ❄️ 藍色按鈕開始。</div>
  <div class="card">
    <h3>取貨資料</h3>
    <div class="sub">7-11 冷凍超商取貨 / 門市自取</div>
    <!-- ❄️ 按鈕會被程式插在這裡 -->
    <div class="fake">請選擇門市（← 這是官網原本的欄位，示意用）</div>
  </div>
  <div class="foot">初啼 Chūtí · 冷凍取貨門市查詢<br>資料來源：統一超商官方冷凍交貨便門市（每週自動更新）</div>
</div>

<script>
(function(){
  var DATA_URL='https://cdn.jsdelivr.net/gh/ak478869711-hub/chuti-cvs-frozen@master/frozen-stores.json';
  var CITY_ORDER=['基隆市','台北市','新北市','桃園市','新竹市','新竹縣','苗栗縣','台中市','彰化縣','南投縣','雲林縣','嘉義市','嘉義縣','台南市','高雄市','屏東縣','宜蘭縣','花蓮縣','台東縣','澎湖縣','金門縣','連江縣'];
  var stores=null, loading=false;
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
  function tw(s){ return (s||'').replace(/台/g,'臺'); }
  function copyText(t){ try{ if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(t); return; } }catch(e){} var ta=document.createElement('textarea'); ta.value=t; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); }

  // 插入 ❄️ 按鈕
  var h3=document.querySelector('.card h3');
  var b=document.createElement('button');
  b.textContent='❄️ 用地圖找冷凍門市（複製店號）';
  b.style.cssText='display:block;width:100%;margin:10px 0 6px;padding:13px;background:#3f8fb0;color:#fff;border:0;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer';
  b.onclick=openModal;
  h3.parentNode.insertBefore(b, h3.nextSibling);

  function ensureModal(){
    if(document.getElementById('chuti-modal')) return;
    var wrap=document.createElement('div'); wrap.id='chuti-modal';
    wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2147483647;display:none;align-items:flex-end;justify-content:center';
    wrap.innerHTML='<div style="background:#fff;width:100%;max-width:520px;height:86vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden"><div style="padding:12px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px"><b id="chuti-title" style="font-size:16px;flex:1">❄️ 找冷凍取貨門市</b><span id="chuti-x" style="font-size:26px;cursor:pointer;padding:0 6px;line-height:1">×</span></div><div id="chuti-search" style="padding:10px 14px;border-bottom:1px solid #eee;display:flex;gap:8px"><select id="chuti-city" style="flex:0 0 110px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px"><option value="">縣市</option></select><input id="chuti-kw" placeholder="打店名/路名/店號" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px"></div><div id="chuti-cnt" style="padding:6px 14px;font-size:12px;color:#888"></div><div id="chuti-list" style="flex:1;overflow:auto;padding:0 14px 14px"></div></div>';
    document.body.appendChild(wrap);
    document.getElementById('chuti-x').onclick=closeModal;
    wrap.addEventListener('click',function(e){ if(e.target===wrap) closeModal(); });
    var sel=document.getElementById('chuti-city'); CITY_ORDER.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    sel.onchange=render; document.getElementById('chuti-kw').addEventListener('input',render);
  }
  function openModal(){ ensureModal(); document.getElementById('chuti-search').style.display='flex'; document.getElementById('chuti-title').textContent='❄️ 找冷凍取貨門市'; document.getElementById('chuti-modal').style.display='flex';
    if(!stores && !loading){ loading=true; document.getElementById('chuti-cnt').textContent='載入門市中…'; fetch(DATA_URL).then(function(r){return r.json();}).then(function(d){ stores=d; loading=false; render(); }).catch(function(){ document.getElementById('chuti-cnt').textContent='載入失敗，請稍後再試。'; }); } else render(); }
  function closeModal(){ var m=document.getElementById('chuti-modal'); if(m) m.style.display='none'; }
  function render(){ if(!stores) return; document.getElementById('chuti-search').style.display='flex';
    var city=document.getElementById('chuti-city').value, kw=document.getElementById('chuti-kw').value.trim();
    var list=document.getElementById('chuti-list'), cnt=document.getElementById('chuti-cnt');
    if(!city){ list.innerHTML=''; cnt.textContent='請先選縣市，再打關鍵字縮小範圍。'; return; }
    var rows=stores.filter(function(s){ return s.c===city; });
    if(kw){ rows=rows.filter(function(s){ return (s.n&&s.n.indexOf(kw)>=0)||(s.a&&s.a.indexOf(kw)>=0)||(s.i&&s.i.indexOf(kw)>=0); }); }
    var total=rows.length, show=rows.slice(0,60);
    cnt.textContent=total?('冷凍門市 '+total+' 家'+(total>60?'，顯示前 60，請打關鍵字縮小':'')):'找不到，換個關鍵字。';
    list.innerHTML=show.map(function(s){ return '<div style="border:1px solid #eee;border-radius:12px;padding:10px 12px;margin:10px 0"><div style="font-weight:800;color:#c65b62">'+s.i+' <span style="color:#333">'+esc(s.n)+'</span></div><div style="color:#888;font-size:13px;margin:3px 0 8px">'+esc(s.a)+'</div><button type="button" data-i="'+s.i+'" data-n="'+esc(s.n)+'" data-c="'+s.c+'" class="chuti-pick" style="background:#3f8fb0;color:#fff;border:0;border-radius:8px;padding:9px 14px;font-weight:700;font-size:14px;cursor:pointer">選這家 →</button></div>'; }).join('');
  }
  document.addEventListener('click',function(e){ var b=e.target.closest && e.target.closest('.chuti-pick'); if(!b) return; pick(b.getAttribute('data-i'), b.getAttribute('data-n'), b.getAttribute('data-c')); });
  function pick(id,name,city){ copyText(id);
    var cityTw=tw(city);
    document.getElementById('chuti-search').style.display='none';
    document.getElementById('chuti-title').textContent='✅ 已複製店號';
    document.getElementById('chuti-cnt').textContent='';
    document.getElementById('chuti-list').innerHTML='<div style="text-align:center;padding:6px 4px"><div style="font-size:32px;font-weight:900;color:#c65b62;letter-spacing:3px;margin-top:6px">'+id+'</div><div style="font-size:17px;font-weight:800;margin:4px 0 2px">'+esc(name)+'</div><div style="color:#888;font-size:13px">'+cityTw+'</div><button type="button" id="chuti-recopy" style="background:#3f8fb0;color:#fff;border:0;border-radius:8px;padding:11px 18px;font-weight:800;font-size:15px;cursor:pointer;margin:14px 0 18px">再複製店號</button><div style="background:#eaf4f8;border:1px solid #d6e8ef;border-radius:12px;padding:14px 16px;text-align:left;font-size:14px;color:#33586a;line-height:2"><b style="color:#2b78a0">正式版接下來會這樣填：</b><br>① 關掉這個視窗<br>② 點「<b>請選擇門市</b>」<br>③ 門市店號 → <b>貼上</b>（'+id+'）<br>④ 門市名稱 → 打「<b>'+esc(name)+'</b>」<br>⑤ 縣市 → 選「<b>'+cityTw+'</b>」<br>⑥ 按<b>確定</b></div><div style="margin-top:16px"><button type="button" id="chuti-back" style="width:100%;background:#fff;color:#3f8fb0;border:1px solid #3f8fb0;border-radius:8px;padding:11px;font-weight:700;font-size:14px;cursor:pointer">← 重新選門市</button></div></div>';
    document.getElementById('chuti-recopy').onclick=function(){ copyText(id); var self=this; self.textContent='已複製 ✔'; setTimeout(function(){ self.textContent='再複製店號'; },1200); };
    document.getElementById('chuti-back').onclick=function(){ openModal(); };
  }
})();
</script>
</body>
</html>
