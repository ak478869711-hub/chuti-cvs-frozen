name: refresh-frozen-stores
on:
  schedule:
    - cron: '17 20 * * 0'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node build-frozen.mjs
      - name: commit if changed
        run: |
          if ! git diff --quiet; then
            git config user.name "chuti-bot"
            git config user.email "ak478869711@gmail.com"
            git add frozen-stores.json
            git commit -m "auto refresh frozen stores"
            git push
          else
            echo "no change"
          fi
